<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Workout Tracker</h1>
      <div class="app-header-actions">
        <button type="button" id="addExerciseBtn" class="btn-primary">+ Add Exercise</button>
        <button
          type="button"
          id="themeToggleBtn"
          class="btn-theme"
          aria-pressed="false"
          title="Toggle light / dark theme"
        >
          Dark mode
        </button>
      </div>
    </header>

    <!-- Shared suggestions for every exercise name input (list="exercise-name-suggestions") -->
    <datalist id="exercise-name-suggestions"></datalist>

    <div id="exercisesMount" aria-live="polite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
