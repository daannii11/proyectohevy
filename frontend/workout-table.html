<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracking Table</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Workout Table</h1>

    <div class="toolbar">
      <button id="addRowBtn" type="button">+ Add Set</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Set Type (Serie)</th>
          <th>Weight (kg)</th>
          <th>Reps</th>
          <th>Done</th>
        </tr>
      </thead>
      <tbody id="setsBody"></tbody>
    </table>

    <p class="hint">W = Warm-up, F = Failed, Normal sets are auto-numbered.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
